name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Validate tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${CARGO_VERSION}"
            exit 1
          fi
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --features pixtuoid-core/test-renderer -- -D warnings
      - run: cargo test --workspace --features pixtuoid-core/test-renderer

  build:
    name: build (${{ matrix.target }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Install musl-tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DIR="pixtuoid-${VERSION}-${{ matrix.target }}"
          mkdir "$DIR"
          cp "target/${{ matrix.target }}/release/pixtuoid" "$DIR/"
          cp "target/${{ matrix.target }}/release/pixtuoid-hook" "$DIR/"
          cp LICENSE "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"

      - uses: actions/upload-artifact@v7
        with:
          name: artifact-${{ matrix.target }}
          path: "*.tar.gz"
          if-no-files-found: error

  deb:
    name: deb (${{ matrix.target }})
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            cross: true
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: deb-${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Install cargo-deb
        uses: taiki-e/install-action@cargo-deb

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Build deb (pixtuoid)
        run: cargo deb -p pixtuoid --no-build --no-strip --target ${{ matrix.target }}

      - name: Build deb (pixtuoid-hook)
        run: cargo deb -p pixtuoid-hook --no-build --no-strip --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v7
        with:
          name: deb-${{ matrix.target }}
          path: target/${{ matrix.target }}/debian/*.deb
          if-no-files-found: error

  release:
    name: release
    needs: [build, deb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.deb > sha256sums.txt

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # Mark v*-rc/-beta/-alpha tags as pre-releases so they don't surface as "latest".
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: ${{ steps.changelog.outputs.content }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.deb
            artifacts/sha256sums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            artifacts/*.tar.gz
            artifacts/*.deb

  publish:
    name: publish to crates.io
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish crates (in dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # Swallow ONLY the "this version is already on crates.io" case (idempotent
          # re-run of a partially-published tag). Any other failure — network, auth,
          # validation, dependency-not-yet-live — must fail the job, not be hidden.
          for crate in pixtuoid-core pixtuoid-hook pixtuoid; do
            if out=$(cargo publish -p "$crate" 2>&1); then
              printf '%s\n' "$out"
              echo "::notice::$crate published"
            elif printf '%s\n' "$out" | grep -qiE 'already (exists|uploaded)|crate version .* is already'; then
              printf '%s\n' "$out"
              echo "::warning::$crate already on crates.io at this version, skipping"
            else
              printf '%s\n' "$out"
              echo "::error::$crate publish failed"
              exit 1
            fi
          done

  homebrew:
    name: update homebrew tap
    needs: release
    # Never let a pre-release (v*-rc/-beta/-alpha) clobber the stable formula.
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Update formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          SHA_MACOS_ARM=$(sha256sum "artifacts/pixtuoid-${TAG}-aarch64-apple-darwin.tar.gz" | cut -d' ' -f1)
          SHA_MACOS_INTEL=$(sha256sum "artifacts/pixtuoid-${TAG}-x86_64-apple-darwin.tar.gz" | cut -d' ' -f1)
          SHA_LINUX_ARM=$(sha256sum "artifacts/pixtuoid-${TAG}-aarch64-unknown-linux-gnu.tar.gz" | cut -d' ' -f1)
          SHA_LINUX_INTEL=$(sha256sum "artifacts/pixtuoid-${TAG}-x86_64-unknown-linux-musl.tar.gz" | cut -d' ' -f1)

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/IvanWng97/homebrew-pixtuoid.git" tap
          mkdir -p tap/Formula

          cat > tap/Formula/pixtuoid.rb <<RUBY
          class Pixtuoid < Formula
            desc "Terminal pixel-art office for AI coding agents"
            homepage "https://github.com/IvanWng97/pixtuoid"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/IvanWng97/pixtuoid/releases/download/${TAG}/pixtuoid-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_ARM}"
              end
              on_intel do
                url "https://github.com/IvanWng97/pixtuoid/releases/download/${TAG}/pixtuoid-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_INTEL}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/IvanWng97/pixtuoid/releases/download/${TAG}/pixtuoid-${TAG}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              end
              on_intel do
                url "https://github.com/IvanWng97/pixtuoid/releases/download/${TAG}/pixtuoid-${TAG}-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_LINUX_INTEL}"
              end
            end

            def install
              bin.install "pixtuoid"
              bin.install "pixtuoid-hook"
            end

            def caveats
              <<~EOS
                To start visualizing your Claude Code sessions:
                  pixtuoid install-hooks
                  pixtuoid run

                Before uninstalling, remove hooks from Claude Code:
                  pixtuoid uninstall-hooks
              EOS
            end

            test do
              assert_match "pixtuoid", shell_output("#{bin}/pixtuoid --version")
            end
          end
          RUBY
          sed -i 's/^          //' tap/Formula/pixtuoid.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pixtuoid.rb
          git commit -m "pixtuoid ${VERSION}"
          git push
