name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-nextest
      - uses: extractions/setup-just@v4
      - name: Validate tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${CARGO_VERSION}"
            exit 1
          fi
      # Single-sourced through the justfile (same recipes as ci.yml + the hooks).
      # Intentionally lighter than `just preflight` (which also runs lint + hack):
      # the tag comes from main, which already passed the full CI matrix — here we
      # re-verify fmt/clippy/tests against the exact tagged commit (`just test`
      # uses nextest).
      - run: just fmt-check
      - run: just clippy
      - run: just test

  build:
    name: build (${{ matrix.target }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: extractions/setup-just@v4

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Install musl-tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: just build-target ${{ matrix.target }} ${{ matrix.cross }}

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DIR="pixtuoid-${VERSION}-${{ matrix.target }}"
          mkdir "$DIR"
          cp "target/${{ matrix.target }}/release/pixtuoid" "$DIR/"
          cp "target/${{ matrix.target }}/release/pixtuoid-hook" "$DIR/"
          cp LICENSE "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"

      - uses: actions/upload-artifact@v7
        with:
          name: artifact-${{ matrix.target }}
          path: "*.tar.gz"
          if-no-files-found: error

  deb:
    name: deb (${{ matrix.target }})
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            cross: true
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: deb-${{ matrix.target }}

      - uses: extractions/setup-just@v4

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Install cargo-deb
        uses: taiki-e/install-action@cargo-deb

      - name: Build
        run: just build-target ${{ matrix.target }} ${{ matrix.cross }}

      - name: Build .deb packages
        run: just deb ${{ matrix.target }}

      - uses: actions/upload-artifact@v7
        with:
          name: deb-${{ matrix.target }}
          path: target/${{ matrix.target }}/debian/*.deb
          if-no-files-found: error

  release:
    name: release
    needs: [build, deb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.deb > sha256sums.txt

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # Mark v*-rc/-beta/-alpha tags as pre-releases so they don't surface as "latest".
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: ${{ steps.changelog.outputs.content }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.deb
            artifacts/sha256sums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            artifacts/*.tar.gz
            artifacts/*.deb

  publish:
    name: publish to crates.io
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish crates (in dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # Publish in dependency order. Idempotent: swallow "already on crates.io"
          # (safe re-run of a partially-published tag). Retry ONLY the index-
          # propagation race (#111) — a just-published dep not yet visible to the
          # sparse index when the dependent publishes. Every other failure (auth,
          # validation, network) fails the job, never hidden.
          publish_one() {
            local crate="$1" attempt out
            for attempt in 1 2 3; do
              if out=$(cargo publish -p "$crate" 2>&1); then
                printf '%s\n' "$out"; echo "::notice::$crate published"; return 0
              elif grep -qiE 'already (exists|uploaded)|crate version .* is already' <<<"$out"; then
                printf '%s\n' "$out"; echo "::warning::$crate already on crates.io, skipping"; return 0
              elif grep -qiE 'no matching package|not found in registry|failed to select a version' <<<"$out"; then
                printf '%s\n' "$out"; echo "::warning::$crate: dependency not yet on the index — retry $attempt/3 after 20s"; sleep 20
              else
                printf '%s\n' "$out"; echo "::error::$crate publish failed"; return 1
              fi
            done
            printf '%s\n' "$out"; echo "::error::$crate failed after 3 attempts — index-propagation race, or an unsatisfiable dependency requirement"; return 1
          }
          for crate in pixtuoid-core pixtuoid-hook pixtuoid; do
            publish_one "$crate"
          done

  homebrew:
    name: update homebrew tap
    needs: release
    # Never let a pre-release (v*-rc/-beta/-alpha) clobber the stable formula.
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Update formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          SHA_MACOS_ARM=$(sha256sum "artifacts/pixtuoid-${TAG}-aarch64-apple-darwin.tar.gz" | cut -d' ' -f1)
          SHA_MACOS_INTEL=$(sha256sum "artifacts/pixtuoid-${TAG}-x86_64-apple-darwin.tar.gz" | cut -d' ' -f1)
          SHA_LINUX_ARM=$(sha256sum "artifacts/pixtuoid-${TAG}-aarch64-unknown-linux-gnu.tar.gz" | cut -d' ' -f1)
          SHA_LINUX_INTEL=$(sha256sum "artifacts/pixtuoid-${TAG}-x86_64-unknown-linux-musl.tar.gz" | cut -d' ' -f1)

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/IvanWng97/homebrew-pixtuoid.git" tap
          mkdir -p tap/Formula

          cat > tap/Formula/pixtuoid.rb <<RUBY
          class Pixtuoid < Formula
            desc "Terminal pixel-art office for AI coding agents"
            homepage "https://github.com/IvanWng97/pixtuoid"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/IvanWng97/pixtuoid/releases/download/${TAG}/pixtuoid-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_ARM}"
              end
              on_intel do
                url "https://github.com/IvanWng97/pixtuoid/releases/download/${TAG}/pixtuoid-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_INTEL}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/IvanWng97/pixtuoid/releases/download/${TAG}/pixtuoid-${TAG}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              end
              on_intel do
                url "https://github.com/IvanWng97/pixtuoid/releases/download/${TAG}/pixtuoid-${TAG}-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_LINUX_INTEL}"
              end
            end

            def install
              bin.install "pixtuoid"
              bin.install "pixtuoid-hook"
            end

            def caveats
              <<~EOS
                To start visualizing your Claude Code sessions:
                  pixtuoid install-hooks
                  pixtuoid run

                Before uninstalling, remove hooks from Claude Code:
                  pixtuoid uninstall-hooks
              EOS
            end

            test do
              assert_match "pixtuoid", shell_output("#{bin}/pixtuoid --version")
            end
          end
          RUBY
          sed -i 's/^          //' tap/Formula/pixtuoid.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pixtuoid.rb
          git commit -m "pixtuoid ${VERSION}"
          git push
