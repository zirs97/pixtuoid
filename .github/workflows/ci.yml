name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: extractions/setup-just@v4
      - run: just fmt-check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v4
      - run: just clippy

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  machete:
    name: unused deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # No rust-toolchain: cargo-machete parses Cargo.toml, it never compiles.
      - uses: taiki-e/install-action@cargo-machete
      - uses: extractions/setup-just@v4
      - run: just machete

  hack:
    name: feature combinations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-hack
      - uses: extractions/setup-just@v4
      - run: just hack

  semver:
    name: semver-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-semver-checks
      - uses: extractions/setup-just@v4
      - run: just semver

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - name: Generate coverage + JUnit XML (single test run)
        run: cargo llvm-cov nextest --workspace --features pixtuoid-core/test-renderer --lcov --output-path lcov.info --profile ci
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          flags: unit
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: target/nextest/ci/junit.xml
          report-type: test_results
          flags: unit
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  smoke:
    name: smoke
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries + examples
        run: cargo build --release --workspace --bins --examples
      - name: pixtuoid --help exits 0
        run: ./target/release/pixtuoid --help
      - name: pixtuoid-hook exits 0 with no socket
        run: |
          echo '{}' | ./target/release/pixtuoid-hook || true
          echo "hook shim exited (expected silent no-op)"
      - name: install-hooks round-trip
        run: |
          mkdir -p /tmp/smoke-test/.claude
          echo '{}' > /tmp/smoke-test/.claude/settings.json
          HOME=/tmp/smoke-test ./target/release/pixtuoid install-hooks
          HOME=/tmp/smoke-test ./target/release/pixtuoid uninstall-hooks
      - name: snapshot renders without crash
        run: ./target/release/examples/snapshot /tmp/smoke-snapshot.png
      - name: Upload snapshot artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-snapshot
          path: /tmp/smoke-snapshot.png
          retention-days: 7
