[pack]
name    = "topdown"
version = "1"

# Same palette as the side-view pack; H (hair) and B (shirt) stay as the
# per-agent recolor targets so the existing recolor pipeline works.
[palette]
"." = "transparent"
"H" = "#2a1a0e"   # hair (per-agent recolor target)
"S" = "#f4c79a"   # skin
"e" = "#1a1a1a"   # eyes
"m" = "#a04040"   # mouth
"O" = "#3a1414"   # open-mouth (waiting)
"B" = "#2e62cf"   # shirt (per-agent recolor target)
"c" = "#7ed4e2"   # cyan accent (water cooler tank, coffee display)
"j" = "#1c2a36"   # monitor screen when idle (powered, dark wallpaper)
"w" = "#ececec"   # whiteboard surface (off-white)
"M" = "#3a3a40"   # monitor frame
"k" = "#1a1a22"   # keyboard
"D" = "#8b5a2b"   # desk wood
"d" = "#5a3818"   # desk shadow
"n" = "#3a2a1c"   # outline / nose shadow
"f" = "#6a4a26"   # floor mat warm
"F" = "#5a3a20"   # floor mat dark
"l" = "#4a8f3a"   # plant leaf
"L" = "#2f6b25"   # plant leaf shadow
"g" = "#c2734f"   # plant pot terracotta
"C" = "#7e6a55"   # couch fabric
"K" = "#a8a8b0"   # coffee station chrome
"r" = "#a83232"   # book spine red
"b" = "#3a5a9e"   # book spine blue
"y" = "#c8a64c"   # book spine yellow / paperback
"q" = "#1a1a1a"   # marker / whiteboard scribble

[animations.seated]
frames   = ["seated.sprite"]
frame_ms = 600

[animations.typing]
frames   = ["typing_0.sprite", "typing_1.sprite"]
frame_ms = 140

[animations.standing]
frames   = ["standing.sprite"]
frame_ms = 600

[animations.walking]
frames   = ["walking_0.sprite", "walking_1.sprite"]
frame_ms = 220

[animations.desk]
frames   = ["desk.sprite"]
